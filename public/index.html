<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hospital - Patient Dashboard</title>
    <style>
        :root {
            --primary-blue: #0b66c3;
            --header-text: #343a40;
            --danger: #d9534f;
            --success: #28a745;
            --light-gray: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #fff;
        }

        /* --- ✨ Underline Effect (Sirf Links ke liye) --- */
        .navigation a,
        .logout-link {
            text-decoration: none;
            color: var(--header-text);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            padding-bottom: 2px;
            transition: all 0.2s ease;
        }

        /* Hover Effect */
        .navigation a:hover {
            color: var(--primary-blue);
        }

        /* CLICK EFFECT: Sirf Navigation Links aur Logout par Underline aayegi */
        .navigation a:active,
        .logout-link:active {
            border-bottom: 3px solid #000 !important;
            color: #000 !important;
        }

        /* --- 🚫 Logo Section (Underline Hatane ke liye) --- */
        .logo-container {
            font-size: 1.5em;
            font-weight: bold;
            text-decoration: none;
            color: var(--header-text);
            cursor: pointer;
            user-select: none;
            border-bottom: none !important;
            /* Underline band */
        }

        /* Logo par click karne par kuch nahi hoga (Simple rahega) */
        .logo-container:active {
            border-bottom: none !important;
            text-decoration: none !important;
        }

        /* --- Rest of the Styling --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 1px solid #eee;
        }

        .navigation {
            display: flex;
            align-items: center;
        }

        .navigation a {
            margin-left: 25px;
            font-weight: 500;
        }

        .login-nav-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            margin-left: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-nav-btn:hover {
            background: #0056b3;
        }

        .login-nav-btn:active {
            text-decoration: underline;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 20px;
        }

        .profile-circle {
            width: 40px;
            height: 40px;
            background: #a855f7;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border: 2px solid #ddd;
            cursor: pointer;
        }

        .hero-section {
            display: flex;
            justify-content: center;
            padding: 60px 5%;
        }

        .hero-content {
            background: var(--primary-blue);
            color: white;
            padding: 60px;
            border-radius: 20px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .text-content h1 {
            font-size: 3em;
            margin: 0;
        }

        .gen-btn {
            background: white;
            color: var(--primary-blue);
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            margin-top: 20px;
            font-size: 1.1em;
            cursor: pointer;
        }

        .gen-btn:active {
            text-decoration: underline;
        }

        /* Dashboard Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .dashboard-card {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 20px;
            overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .dash-header {
            background: var(--primary-blue);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .dash-body {
            padding: 25px;
        }

        .user-info-box {
            border-bottom: 2px solid var(--light-gray);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .info-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            font-weight: bold;
        }

        .info-value {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        .active-token-card {
            background: #f0f7ff;
            border: 1px dashed var(--primary-blue);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .cancel-btn {
            background: #fff1f0;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .logout-link {
            display: inline-block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }

        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box; /* Prevents overflow caused by padding */
}

body {
    width: 100%;
    overflow-x: hidden; /* Stops horizontal scrolling */
}
        @media (max-width: 600px) {
    .navigation {
        display: flex;
        flex-direction: column; /* Stacks Home, About, Login vertically */
        align-items: center;
        gap: 15px;
    }
}
    </style>
</head>

<body>

    <header class="header">
        <div class="logo-container" onclick="location.reload()"
            style="display: flex; align-items: center; gap: 10px; border-bottom: none !important;">
            <img src="logo.png" alt="Smart Hospital Logo" style="width: 35px; height: 35px; object-fit: contain;">
            <span style="font-size: 24px; color: #343a40;">Smart Hospital</span>
        </div>
        <nav class="navigation">
            <a href="index.html">HOME</a>
            <a href="doctor-login.html">STAFF LOGIN</a>
            <a href="live-status.html">LIVE STATUS</a>
            <div id="authArea">
                <button class="login-nav-btn" onclick="window.location.href='patient-login.html'">Login</button>
            </div>
        </nav>
    </header>

    <div class="hero-section">
        <div class="hero-content">
            <div class="text-content">
                <h1>Ready to <br>Help You.</h1>
                <p>Login to your profile to manage your appointments.</p>
                <button class="gen-btn" onclick="handleMainAction()">Generate e-Token →</button>
            </div>
            <img src="image/header_img-DhAi3lLA.png" width="350" style="z-index: 10;">
        </div>
    </div>

    <div id="dashboardModal" class="modal-overlay">
        <div class="dashboard-card">
            <div class="dash-header">
                <div class="profile-circle"
                    style="margin: 0 auto 10px; width: 60px; height: 60px; font-size: 24px; background: white; color: var(--primary-blue);">
                    <span id="dashInitial">P</span>
                </div>
                <h3 id="dashName">Patient Name</h3>
                <span id="dashMobile" style="font-size: 14px; opacity: 0.9;">+91 0000000000</span>
            </div>
            <div class="dash-body">
                <div class="user-info-box">
                    <div class="info-label">Status</div>
                    <div class="info-value">Patient verified ✅</div>
                </div>
                <div id="tokenSection">
                    <div class="info-label">Active Appointment</div>
                    <div class="active-token-card">
                        <div id="dashToken" style="font-size: 32px; font-weight: bold; color: var(--primary-blue);">--
                        </div>
                        <div id="dashDoc" style="font-size: 14px; color: #555;">Doctor: Not Assigned</div>
                        <button class="cancel-btn" onclick="cancelToken()">Cancel This Token</button>
                    </div>
                </div>
                <div style="text-align: center;">
                    <a class="logout-link" onclick="logout()">Logout from Device</a>
                </div>
                <button onclick="closeDashboard()"
                    style="width:100%; background:#eee; border:none; padding:10px; margin-top:10px; border-radius:6px; cursor:pointer;">Close
                    Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        function init() {
            const userName = localStorage.getItem('loggedInUser');
            const authArea = document.getElementById('authArea');

            if (userName) {
                const initial = userName.charAt(0).toUpperCase();
                const mainBtn = document.querySelector('.gen-btn');
                if (mainBtn) mainBtn.innerText = "Book Appointment Now →";

                // PASTE IT HERE inside the innerHTML template:
                authArea.innerHTML = `
            <div class="profile-area">
                <span style="font-size:14px; color:#555;">Hi, ${userName.split(' ')[0]}</span>
                <div class="profile-circle" onclick="openDashboard()">${initial}</div>
                
                <a href="javascript:void(0)" onclick="logout()" style="margin-left:15px; font-size:12px; color:var(--danger); font-weight:bold; text-decoration:none;">LOGOUT</a>
            </div>
        `;
            }
        }

        function handleMainAction() {
            if (localStorage.getItem('loggedInUser')) { window.location.href = 'appointment.html'; }
            else { window.location.href = 'patient-login.html'; }
        }

        function openDashboard() {
            const userName = localStorage.getItem('loggedInUser');
            const userPhone = localStorage.getItem('userPhone');
            const token = localStorage.getItem('tempTokenID');
            if (!userName) return;
            document.getElementById('dashName').innerText = userName;
            document.getElementById('dashMobile').innerText = "+91 " + (userPhone || "XXXXXXXXXX");
            document.getElementById('dashInitial').innerText = userName.charAt(0).toUpperCase();
            document.getElementById('dashToken').innerText = token || "--";
            document.getElementById('dashboardModal').style.display = 'flex';
        }

        function closeDashboard() { document.getElementById('dashboardModal').style.display = 'none'; }

        function cancelToken() {
            if (confirm("Cancel appointment?")) {
                localStorage.removeItem('tempTokenID');
                location.reload();
            }
        }

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                // Clear everything: Name, Phone, and Tokens
                localStorage.clear();

                // Redirect to index or reload to reset the UI
                window.location.href = 'index.html';
            }
        }
        window.onload = init;
    </script>
</body>

</html>
