<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hospital - Patient Dashboard</title>
    <style>
        :root {
            --primary-blue: #0b66c3;
            --header-text: #343a40;
            --danger: #d9534f;
            --success: #28a745;
            --light-gray: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff;
            width: 100%;
            overflow-x: hidden;
        }

        /* --- Navigation & Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 1px solid #eee;
            background: #fff;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5em;
            font-weight: bold;
            color: var(--header-text);
            cursor: pointer;
            user-select: none;
            text-decoration: none;
        }

        .navigation {
            display: flex;
            align-items: center;
        }

        .navigation a {
            margin-left: 25px;
            font-weight: 500;
            text-decoration: none;
            color: var(--header-text);
            transition: color 0.2s;
            font-size: 14px;
        }

        .navigation a:hover {
            color: var(--primary-blue);
        }

        .login-nav-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            margin-left: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- Hero Section --- */
        .hero-section {
            display: flex;
            justify-content: center;
            padding: 40px 5%;
        }

        .hero-content {
            background: var(--primary-blue);
            color: white;
            padding: 60px;
            border-radius: 20px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allows stacking on mobile */
            text-align: left;
        }

        .text-content {
            flex: 1;
            min-width: 300px;
        }

        .text-content h1 {
            font-size: clamp(2em, 5vw, 3.5em); /* Fluid typography */
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .hero-content img {
            max-width: 100%;
            height: auto;
            width: 350px;
            z-index: 10;
        }

        .gen-btn {
            background: white;
            color: var(--primary-blue);
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            margin-top: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gen-btn:active {
            transform: scale(0.95);
        }

        /* --- Dashboard Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .dashboard-card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .dash-header {
            background: var(--primary-blue);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .profile-circle {
            width: 50px; height: 50px;
            background: #a855f7;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 0 auto 10px;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .dash-body { padding: 20px; }

        /* --- Responsive Media Queries --- */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .navigation {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                gap: 10px;
            }

            .navigation a {
                margin: 0 10px;
                font-size: 13px;
            }

            .login-nav-btn {
                margin-left: 0;
                width: 100%;
                margin-top: 10px;
            }

            .hero-content {
                padding: 40px 20px;
                text-align: center;
                flex-direction: column;
            }

            .hero-content img {
                width: 250px;
                margin-top: 30px;
            }
            
            .text-content {
                min-width: 100%;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo-container" onclick="location.reload()">
            <img src="logo.png" alt="Logo" style="width: 35px; height: 35px;">
            <span>Smart Hospital</span>
        </div>
        <nav class="navigation">
            <a href="index.html">HOME</a>
            <a href="doctor-login.html">STAFF LOGIN</a>
            <a href="live-status.html">LIVE STATUS</a>
            <div id="authArea">
                <button class="login-nav-btn" onclick="window.location.href='patient-login.html'">Login</button>
            </div>
        </nav>
    </header>

    <div class="hero-section">
        <div class="hero-content">
            <div class="text-content">
                <h1>Ready to <br>Help You.</h1>
                <p>Login to your profile to manage your appointments and track your health.</p>
                <button class="gen-btn" onclick="handleMainAction()">Generate e-Token →</button>
            </div>
            <img src="image/header_img-DhAi3lLA.png" alt="Healthcare Image">
        </div>
    </div>

    <div id="dashboardModal" class="modal-overlay">
        <div class="dashboard-card">
            <div class="dash-header">
                <div class="profile-circle" id="dashInitial">P</div>
                <h3 id="dashName">Patient Name</h3>
                <span id="dashMobile" style="font-size: 14px; opacity: 0.9;">+91 0000000000</span>
            </div>
            <div class="dash-body">
                <div style="margin-bottom: 20px;">
                    <p style="font-size: 12px; color: #888;">STATUS</p>
                    <p style="font-weight: 600;">Patient Verified ✅</p>
                </div>
                <div style="background: #f0f7ff; border: 1px dashed var(--primary-blue); padding: 15px; border-radius: 12px; text-align: center;">
                    <p style="font-size: 12px; color: #888;">ACTIVE TOKEN</p>
                    <div id="dashToken" style="font-size: 28px; font-weight: bold; color: var(--primary-blue);">--</div>
                </div>
                <button onclick="closeDashboard()" style="width:100%; background:#eee; border:none; padding:12px; margin-top:15px; border-radius:8px; cursor:pointer; font-weight:bold;">Close</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" onclick="logout()" style="color: var(--danger); text-decoration: none; font-size: 13px; font-weight: bold;">Logout from Device</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function init() {
            const userName = localStorage.getItem('loggedInUser');
            const authArea = document.getElementById('authArea');

            if (userName) {
                const initial = userName.charAt(0).toUpperCase();
                const mainBtn = document.querySelector('.gen-btn');
                if (mainBtn) mainBtn.innerText = "Book Appointment Now →";

                authArea.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size:13px; color:#555;">Hi, ${userName.split(' ')[0]}</span>
                        <div class="profile-circle" style="margin:0; width:35px; height:35px;" onclick="openDashboard()">${initial}</div>
                    </div>
                `;
            }
        }

        function handleMainAction() {
            if (localStorage.getItem('loggedInUser')) { 
                window.location.href = 'appointment.html'; 
            } else { 
                window.location.href = 'patient-login.html'; 
            }
        }

        function openDashboard() {
            const userName = localStorage.getItem('loggedInUser');
            const userPhone = localStorage.getItem('userPhone');
            const token = localStorage.getItem('tempTokenID');
            if (!userName) return;
            
            document.getElementById('dashName').innerText = userName;
            document.getElementById('dashMobile').innerText = "+91 " + (userPhone || "XXXXXXXXXX");
            document.getElementById('dashInitial').innerText = userName.charAt(0).toUpperCase();
            document.getElementById('dashToken').innerText = token || "No Active Token";
            document.getElementById('dashboardModal').style.display = 'flex';
        }

        function closeDashboard() { 
            document.getElementById('dashboardModal').style.display = 'none'; 
        }

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
        
        window.onload = init;
    </script>
</body>
</html>
