<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hospital Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-blue: #0b66c3;
            --bg-light: #f0f2f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
        }

        .sidebar {
            width: 240px;
            background: var(--primary-blue);
            height: 100vh;
            position: fixed;
            color: white;
            padding: 20px;
        }

       .main-content {
    margin-left: 0; /* Default for mobile */
    padding: 20px;
}

@media (min-width: 768px) {
    .main-content { margin-left: 280px; } /* Only apply margin on laptops */
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* Automatically stacks cards */
    gap: 20px;
}

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }

        .stat-card h3 { margin: 0; color: #666; font-size: 14px; }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: var(--primary-blue); }

        /* Charts Layout */
        .charts-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .chart-box {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .dept-list {
            margin-top: 20px;
            list-style: none;
            padding: 0;
        }

        .dept-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box; /* Prevents overflow caused by padding */
}

body {
    width: 100%;
    overflow-x: hidden; /* Stops horizontal scrolling */
}
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Hospital Admin</h2>
        <hr style="opacity: 0.3;">
        <p>Dashboard</p>
        <p>Manage Doctors</p>
        <p>Emergency Logs</p>
        <p>Settings</p>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Analytics Overview</h1>
            <button onclick="window.print()" style="padding: 10px 20px; background: white; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;">Export PDF</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Patients</h3>
                <p id="totalP">128</p>
            </div>
            <div class="stat-card">
                <h3>Emergencies Today</h3>
                <p style="color: #dc3545;">12</p>
            </div>
            <div class="stat-card">
                <h3>Avg. Wait Time</h3>
                <p>18 min</p>
            </div>
            <div class="stat-card">
                <h3>Served Rate</h3>
                <p>92%</p>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <h4 style="margin-top:0;">Patients per Hour (Simulated)</h4>
                <canvas id="lineChart"></canvas>
            </div>
            <div class="chart-box">
                <h4 style="margin-top:0;">Traffic by Department</h4>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Line Chart Logic
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: ['9AM', '10AM', '11AM', '12PM', '1PM', '2PM'],
                datasets: [{
                    label: 'New Tokens',
                    data: [12, 19, 35, 22, 10, 15],
                    borderColor: '#0b66c3',
                    fill: true,
                    backgroundColor: 'rgba(11, 102, 195, 0.1)'
                }]
            }
        });

        // Pie Chart Logic
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['General', 'Ortho', 'ENT', 'Pediatrics'],
                datasets: [{
                    data: [40, 20, 15, 25],
                    backgroundColor: ['#0b66c3', '#28a745', '#ffc107', '#dc3545']
                }]
            }
        });
    </script>
</body>
</html>
